name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514

          direct_prompt: |
            Review this PR for:
            1. Security issues (SQL injection, credential leaks, exposed secrets)
            2. n8n workflow correctness (node connections, expression syntax)
            3. Terraform best practices
            4. SQL schema issues
            5. Message parser edge cases

            Context: This is a Telegram finance bot using n8n + PostgreSQL on Oracle Cloud.
            Focus on what matters — skip style nitpicks.
