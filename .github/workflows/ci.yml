name: CI — Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JSON / n8n workflow lint ───────────────────────────────
  json-lint:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          echo "Checking JSON syntax..."
          find . -name '*.json' -not -path './.git/*' | while read f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $f"
              python3 -m json.tool "$f"
              exit 1
            else
              echo "✅ $f"
            fi
          done

  # ── JavaScript lint ────────────────────────────────────────
  js-lint:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ESLint
        run: npm install eslint@latest
      - name: Lint parser
        run: npx eslint parser/*.js --no-eslintrc --rule '{"no-unused-vars":"warn","no-undef":"warn","semi":"warn"}' || true

  # ── Python lint ────────────────────────────────────────────
  python-lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ruff
      - name: Ruff check
        run: ruff check parser/*.py
      - name: Ruff format check
        run: ruff format --check parser/*.py

  # ── Terraform validate ─────────────────────────────────────
  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

  # ── SQL syntax check ───────────────────────────────────────
  sql-check:
    name: Validate SQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Run init SQL against test DB
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -d test -f docker/db-init/init-finance-db.sql
          echo "✅ SQL init script is valid"

