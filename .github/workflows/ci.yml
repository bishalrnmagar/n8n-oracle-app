name: CI — Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # ── Python lint ────────────────────────────────────────────
  python-lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ruff
      - name: Ruff check
        run: ruff check parser/ analytics/
      - name: Ruff format check
        run: ruff format --check parser/ analytics/


