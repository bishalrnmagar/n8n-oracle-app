name: Secrets Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secrets-check:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Check for sensitive files
        run: |
          FAIL=0
          for pattern in "*.tfstate" "terraform.tfvars" ".env" "*.pem" "*.key"; do
            FOUND=$(git ls-files "$pattern" "**/$pattern" 2>/dev/null)
            if [ -n "$FOUND" ]; then
              echo "::error::Sensitive file tracked: $FOUND"
              FAIL=1
            fi
          done

          # Check for hardcoded secrets patterns in tracked files
          if git diff --cached --diff-filter=d -S 'sk-ant-' HEAD 2>/dev/null | grep -q 'sk-ant-'; then
            echo "::error::Anthropic API key detected in diff"
            FAIL=1
          fi
          if git diff --cached --diff-filter=d -S 'AAAA' HEAD 2>/dev/null | grep -qP '\b\d+:AA[A-Za-z0-9_-]{30,}\b'; then
            echo "::error::Possible Telegram bot token detected in diff"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "✅ No secrets found"
